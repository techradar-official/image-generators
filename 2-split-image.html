<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRadar Split Image Creator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            justify-content: space-between;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
        }
        .control-group h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.1em;}
        input[type="text"], input[type="file"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 90%;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }
        .slider-group input { flex: 1; }
        .center-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background-color: #004494; }
        .reset-btn { background-color: #6c757d; }
        .reset-btn:hover { background-color: #5a6268; }
        .export-btn { background-color: #28a745; font-size: 1.1em; padding: 12px 24px; margin-top: 20px;}
        .export-btn:hover { background-color: #218838; }
        
        #canvas-container {
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            background: #ddd;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        .instructions { margin-top: 15px; color: #666; font-size: 0.9em; text-align: center;}
    </style>
</head>
<body>

    <h2>1920x1080 Image Splitter</h2>

    <div class="controls-container">
        <div class="control-group" id="left-controls">
            <h3>Left Image</h3>
            <input type="text" id="urlLeft" placeholder="Paste image URL here...">
            <input type="file" id="fileLeft" accept="image/*">
            <div class="slider-group">
                <label>Scale:</label>
                <input type="range" id="scaleLeft" min="0.1" max="3" step="0.025" value="1">
            </div>
            <div class="slider-group">
                <label>Rotate:</label>
                <input type="range" id="rotLeft" min="-180" max="180" step="1" value="0">
            </div>
            <button class="reset-btn" id="btnResetLeft">Reset Left</button>
        </div>

        <div class="center-controls">
            <button id="btnSwapLine">⤡ Swap Line Angle</button>
            <button id="btnSwapImg">⇄ Swap Images</button>
        </div>

        <div class="control-group" id="right-controls">
            <h3>Right Image</h3>
            <input type="text" id="urlRight" placeholder="Paste image URL here...">
            <input type="file" id="fileRight" accept="image/*">
            <div class="slider-group">
                <label>Scale:</label>
                <input type="range" id="scaleRight" min="0.1" max="3" step="0.025" value="1">
            </div>
            <div class="slider-group">
                <label>Rotate:</label>
                <input type="range" id="rotRight" min="-180" max="180" step="1" value="0">
            </div>
            <button class="reset-btn" id="btnResetRight">Reset Right</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="splitCanvas" width="1920" height="1080"></canvas>
    </div>

    <p class="instructions">
        <strong>Tip:</strong> Click and drag to move images. They will lightly "snap" to the center.<br>
        <strong>Keyboard Shortcut:</strong> Click a panel and press <strong>Ctrl+V / Cmd+V</strong> to paste a copied image!
    </p>
    
    <button class="export-btn" id="btnDownload">Download Final JPEG</button>

    <script>
        const canvas = document.getElementById('splitCanvas');
        const ctx = canvas.getContext('2d');

        let imgLeft = { img: new Image(), x: 0, y: 0, trueX: 0, trueY: 0, scale: 1, rotation: 0, loaded: false };
        let imgRight = { img: new Image(), x: 0, y: 0, trueX: 0, trueY: 0, scale: 1, rotation: 0, loaded: false };
        
        let lineDirection = 'tl-br'; 
        let nextPasteTarget = 'left';

        imgLeft.img.crossOrigin = "Anonymous";
        imgRight.img.crossOrigin = "Anonymous";

        let isDragging = false;
        let startX, startY;
        let activeSide = null;
        const SNAP_THRESHOLD = 20;

        // Render the canvas
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let topSplitX, bottomSplitX;
            if (lineDirection === 'tl-br') {
                topSplitX = canvas.width * 0.4;
                bottomSplitX = canvas.width * 0.6;
            } else {
                topSplitX = canvas.width * 0.6;
                bottomSplitX = canvas.width * 0.4;
            }

            // --- DRAW LEFT SIDE MASK ---
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(topSplitX, 0);
            ctx.lineTo(bottomSplitX, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            ctx.clip(); 

            if (imgLeft.loaded) {
                ctx.translate(imgLeft.x, imgLeft.y);
                ctx.rotate(imgLeft.rotation * Math.PI / 180);
                ctx.scale(imgLeft.scale, imgLeft.scale);
                ctx.drawImage(imgLeft.img, -imgLeft.img.width / 2, -imgLeft.img.height / 2);
            } else {
                ctx.fillStyle = '#eeeeee';
                ctx.fill();
            }
            ctx.restore();

            // --- DRAW RIGHT SIDE MASK ---
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(topSplitX, 0);
            ctx.lineTo(canvas.width, 0);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(bottomSplitX, canvas.height);
            ctx.closePath();
            ctx.clip(); 

            if (imgRight.loaded) {
                ctx.translate(imgRight.x, imgRight.y);
                ctx.rotate(imgRight.rotation * Math.PI / 180);
                ctx.scale(imgRight.scale, imgRight.scale);
                ctx.drawImage(imgRight.img, -imgRight.img.width / 2, -imgRight.img.height / 2);
            } else {
                ctx.fillStyle = '#cccccc';
                ctx.fill();
            }
            ctx.restore();

            // --- DRAW THICK WHITE SPLIT LINE WITH OFF-CANVAS CAPS ---
            const extY = 100;
            const extX = (extY / canvas.height) * (bottomSplitX - topSplitX);

            ctx.beginPath();
            ctx.moveTo(topSplitX - extX, -extY); 
            ctx.lineTo(bottomSplitX + extX, canvas.height + extY); 
            ctx.strokeStyle = '#ffffff'; 
            ctx.lineWidth = 40; 
            ctx.stroke();
        }

        function loadImage(source, sideObj, callback) {
            sideObj.img.onload = () => {
                sideObj.loaded = true;
                sideObj.x = canvas.width / 2;
                sideObj.y = canvas.height / 2;
                sideObj.trueX = canvas.width / 2;
                sideObj.trueY = canvas.height / 2;
                sideObj.scale = 1;
                sideObj.rotation = 0;
                draw();
                if (callback) callback();
            };
            sideObj.img.onerror = () => {
                alert("Could not load image. It might be blocked by the website's security (CORS). Try saving the image to your computer and uploading it instead.");
            }
            sideObj.img.src = source;
        }

        function resetSide(sideObj, scaleId, rotId) {
            if(sideObj.loaded) {
                sideObj.x = canvas.width / 2;
                sideObj.y = canvas.height / 2;
                sideObj.trueX = canvas.width / 2;
                sideObj.trueY = canvas.height / 2;
                sideObj.scale = 1;
                sideObj.rotation = 0;
                document.getElementById(scaleId).value = 1;
                document.getElementById(rotId).value = 0;
                draw();
            }
        }

        // --- GLOBAL PASTE LISTENER (CONTEXT AWARE) ---
        window.addEventListener('paste', (e) => {
            try {
                const clipboardData = e.clipboardData || window.clipboardData;
                if (!clipboardData || !clipboardData.items) return;

                const items = clipboardData.items;
                let blob = null;

                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") === 0) {
                        blob = items[i].getAsFile();
                        break;
                    }
                }

                if (blob) {
                    e.preventDefault(); // Stop standard input box pasting behavior for images
                    const url = URL.createObjectURL(blob);
                    
                    let targetSide = nextPasteTarget;
                    const activeEl = document.activeElement;

                    // Override default queue if user clicked inside a specific control panel
                    if (activeEl) {
                        if (activeEl.closest('#left-controls')) {
                            targetSide = 'left';
                        } else if (activeEl.closest('#right-controls')) {
                            targetSide = 'right';
                        }
                    }

                    if (targetSide === 'left') {
                        loadImage(url, imgLeft);
                        nextPasteTarget = 'right'; 
                    } else {
                        loadImage(url, imgRight);
                        nextPasteTarget = 'left'; 
                    }
                }
            } catch (err) {
                console.error("Paste handled cleanly but failed:", err);
            }
        });

        // --- EVENT LISTENERS FOR INPUTS (Now update the paste queue) ---
        document.getElementById('urlLeft').addEventListener('change', (e) => {
            loadImage(e.target.value, imgLeft);
            nextPasteTarget = 'right'; // Image manually loaded to left, prep right for paste
        });
        document.getElementById('urlRight').addEventListener('change', (e) => {
            loadImage(e.target.value, imgRight);
            nextPasteTarget = 'left'; // Image manually loaded to right, prep left for paste
        });
        
        document.getElementById('fileLeft').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                loadImage(URL.createObjectURL(e.target.files[0]), imgLeft);
                nextPasteTarget = 'right';
            }
        });
        document.getElementById('fileRight').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                loadImage(URL.createObjectURL(e.target.files[0]), imgRight);
                nextPasteTarget = 'left';
            }
        });

        document.getElementById('scaleLeft').addEventListener('input', (e) => { imgLeft.scale = parseFloat(e.target.value); draw(); });
        document.getElementById('rotLeft').addEventListener('input', (e) => { imgLeft.rotation = parseInt(e.target.value); draw(); });
        document.getElementById('scaleRight').addEventListener('input', (e) => { imgRight.scale = parseFloat(e.target.value); draw(); });
        document.getElementById('rotRight').addEventListener('input', (e) => { imgRight.rotation = parseInt(e.target.value); draw(); });

        document.getElementById('btnResetLeft').addEventListener('click', () => resetSide(imgLeft, 'scaleLeft', 'rotLeft'));
        document.getElementById('btnResetRight').addEventListener('click', () => resetSide(imgRight, 'scaleRight', 'rotRight'));

        document.getElementById('btnSwapLine').addEventListener('click', () => {
            lineDirection = lineDirection === 'tl-br' ? 'tr-bl' : 'tl-br';
            draw();
        });

        document.getElementById('btnSwapImg').addEventListener('click', () => {
            // Swap references and all state values perfectly
            const tempImg = imgLeft.img;
            const tempLoaded = imgLeft.loaded;
            const tempX = imgLeft.x;
            const tempY = imgLeft.y;
            const tempTrueX = imgLeft.trueX;
            const tempTrueY = imgLeft.trueY;
            const tempScale = imgLeft.scale;
            const tempRot = imgLeft.rotation;

            imgLeft.img = imgRight.img;
            imgLeft.loaded = imgRight.loaded;
            imgLeft.x = imgRight.x;
            imgLeft.y = imgRight.y;
            imgLeft.trueX = imgRight.trueX;
            imgLeft.trueY = imgRight.trueY;
            imgLeft.scale = imgRight.scale;
            imgLeft.rotation = imgRight.rotation;

            imgRight.img = tempImg;
            imgRight.loaded = tempLoaded;
            imgRight.x = tempX;
            imgRight.y = tempY;
            imgRight.trueX = tempTrueX;
            imgRight.trueY = tempTrueY;
            imgRight.scale = tempScale;
            imgRight.rotation = tempRot;

            // Immediately reflect swapped values in the UI sliders
            document.getElementById('scaleLeft').value = imgLeft.scale;
            document.getElementById('rotLeft').value = imgLeft.rotation;
            document.getElementById('scaleRight').value = imgRight.scale;
            document.getElementById('rotRight').value = imgRight.rotation;

            draw();
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            try {
                const link = document.createElement('a');
                link.download = 'split-image.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            } catch (err) {
                alert("Security Error: Browser blocked download due to CORS policy. Please download the original images to your PC and use the File Upload buttons instead.");
            }
        });

        // --- DRAG AND DROP & SNAPPING LOGIC ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            let x1, y1, x2, y2;
            if (lineDirection === 'tl-br') {
                x1 = canvas.width * 0.4; y1 = 0;
                x2 = canvas.width * 0.6; y2 = canvas.height;
            } else {
                x1 = canvas.width * 0.6; y1 = 0;
                x2 = canvas.width * 0.4; y2 = canvas.height;
            }
            
            const m = (y2 - y1) / (x2 - x1);
            const b = y1 - (m * x1);
            const expectedX = (mouseY - b) / m;

            if (lineDirection === 'tl-br') {
                if (mouseX < expectedX) {
                    if (imgLeft.loaded) { activeSide = imgLeft; isDragging = true; }
                } else {
                    if (imgRight.loaded) { activeSide = imgRight; isDragging = true; }
                }
            } else { 
                if (mouseX < expectedX) {
                    if (imgLeft.loaded) { activeSide = imgLeft; isDragging = true; }
                } else {
                    if (imgRight.loaded) { activeSide = imgRight; isDragging = true; }
                }
            }

            startX = mouseX;
            startY = mouseY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || !activeSide) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            const dx = mouseX - startX;
            const dy = mouseY - startY;

            activeSide.trueX += dx;
            activeSide.trueY += dy;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            if (Math.abs(activeSide.trueX - centerX) < SNAP_THRESHOLD) {
                activeSide.x = centerX;
            } else {
                activeSide.x = activeSide.trueX;
            }

            if (Math.abs(activeSide.trueY - centerY) < SNAP_THRESHOLD) {
                activeSide.y = centerY;
            } else {
                activeSide.y = activeSide.trueY;
            }

            startX = mouseX;
            startY = mouseY;

            draw();
        });

        window.addEventListener('mouseup', () => { isDragging = false; activeSide = null; });
        window.addEventListener('mouseleave', () => { isDragging = false; activeSide = null; });

        draw();
    </script>
</body>
</html>
